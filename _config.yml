name:         'arp242.net'
url:          'https://www.arp242.net'
author:       'Martin Tournoij'
markdown:     'kramdown'
highlighter:  'none'
includes_dir: ''
future:       true
strict_front_matter: true

defaults: [
  {
    scope:  {path: '_posts'},
    values: {layout: 'post', permalink: '/:path.html'},
  },
  {
    scope:  {path: '_drafts'},
    values: {layout: 'post', permalink: '/draft/:title.html'},
  },
]

include: ['_redirects', '.well-known']
exclude: [
  'Gemfile',
  'Gemfile.lock',
  'README.md',
  'tmp',
  'css',
  'favicon.png',
  '.vim-hl']
