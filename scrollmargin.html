<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<link rel="icon" type="image/png" href="data:image/png;base64,">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Scrollmargin example</title>
	<style>
		html   { height:calc(100% - 1em); margin:0; padding:.5em; }
		body   { background:#3a6ea5; color:#fff; display:flex; flex-direction:column; align-items:center; height:100%; margin:0; padding:0; }
		iframe { width:100%; height:100%; padding:0; margin:0; overflow:auto; border:none; border-radius:8px; }
		a      { color:#fff; }
		p      { font:16px/1.5em sans-serif; text-align:center; max-width:50em; }
	</style>
</head>
<body>
	<p>The main content is in a box with equal edges on the left and right, which looks nice I guess
		but now the scrollbar is no longer aligned to the edge of the screen.<br>
		Back to <a href="/scrollbar.html">I like using scrollbars</a>.</p>
	<iframe src="/"></iframe>
</body>
</html>
